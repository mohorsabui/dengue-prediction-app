<!DOCTYPE html>
<html>
<head>
<title>Login - Dengue AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg-start: #081b29;
    --bg-end: #0e4a6d;
    --card: rgba(11, 28, 51, 0.88);
    --accent: #60e0d3;
    --accent-dark: #17938f;
    --text: #f5f8fb;
    --muted: rgba(245, 248, 251, 0.72);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: radial-gradient(circle at top left, rgba(96,224,211,0.22), transparent 30%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.container {
    width: min(420px, 100%);
    padding: 32px;
    border-radius: 28px;
    background: var(--card);
    backdrop-filter: blur(18px);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
    border: 1px solid rgba(255,255,255,0.08);
}

h1 {
    margin: 0 0 16px;
    font-size: 2rem;
    letter-spacing: 0.02em;
}

p.subtitle {
    margin: 0 0 28px;
    color: var(--muted);
}

input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s ease;
}

input:focus {
    border-color: rgba(96,224,211,0.7);
}

button {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #042a32;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 18px 40px rgba(96,224,211,0.18);
}

.bottom-text {
    margin-top: 20px;
    text-align: center;
    font-size: 0.96rem;
    color: var(--muted);
}

.bottom-text a {
    color: var(--accent);
    font-weight: 600;
}

.error {
    margin: 12px 0 0;
    padding: 12px 14px;
    background: rgba(255, 66, 66, 0.12);
    color: #ffc4c4;
    border-radius: 12px;
    text-align: center;
}
</style>

</head>

<body>
<div class="container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to access your dengue risk dashboard and prediction history.</p>

    <form method="POST">
        <input name="username" placeholder="Username" required autocomplete="username">
        <input name="password" type="password" placeholder="Password" required autocomplete="current-password">
        <button>Login</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <p class="bottom-text">New here? <a href="/signup">Create an account</a></p>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Signup - Dengue AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg-start: #141e30;
    --bg-end: #2d5366;
    --card: rgba(19, 37, 57, 0.88);
    --accent: #72f1dd;
    --accent-dark: #22a49a;
    --text: #ebf5fb;
    --muted: rgba(235,245,251,0.72);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: radial-gradient(circle at bottom right, rgba(114,241,221,0.18), transparent 28%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.container {
    width: min(420px, 100%);
    padding: 34px;
    border-radius: 28px;
    background: var(--card);
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 90px rgba(0, 0, 0, 0.24);
    border: 1px solid rgba(255,255,255,0.08);
}

h1 {
    margin: 0 0 16px;
    font-size: 2rem;
    letter-spacing: 0.02em;
}

p.subtitle {
    margin: 0 0 30px;
    color: var(--muted);
}

input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.08);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s ease;
}

input:focus {
    border-color: rgba(114,241,221,0.7);
}

button {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #042b2f;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 18px 40px rgba(114,241,221,0.18);
}

.bottom-text {
    margin-top: 22px;
    text-align: center;
    font-size: 0.95rem;
    color: var(--muted);
}

.bottom-text a {
    color: var(--accent);
    font-weight: 600;
}

.error {
    margin: 12px 0 0;
    padding: 12px 14px;
    background: rgba(255, 69, 69, 0.12);
    color: #ffc8c8;
    border-radius: 12px;
    text-align: center;
}
</style>

</head>

<body>
<div class="container">
    <h1>Create your account</h1>
    <p class="subtitle">Register once and keep your prediction history safe.</p>

    <form method="POST">
        <input name="username" placeholder="Username" required autocomplete="username">
        <input name="password" type="password" placeholder="Password" required autocomplete="new-password">
        <button>Create Account</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <p class="bottom-text">Already registered? <a href="/login">Login instead</a></p>
</div>
</body>
</html>

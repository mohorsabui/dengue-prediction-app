<!DOCTYPE html>
<html>
<head>
    <title>Dengue Prediction System</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin: 40px auto;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: #2c3e50;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #ff4d4d;
            color: white;
            padding: 12px;
            border: none;
            width: 95%;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #cc0000;
        }

        .result {
            margin-top: 20px;
        }

        progress {
            width: 90%;
            height: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Dengue Prediction System 🦟</h2>

    <form action="/predict" method="post">

        <input type="number" step="any" name="days" placeholder="Days of Fever" required>
        <input type="number" step="any" name="temp" placeholder="Temperature (98–104°F)" required>
        <input type="number" step="any" name="wbc" placeholder="WBC Count" required>

        <input type="number" step="any" name="hemoglobin" placeholder="Hemoglobin" required>
        <input type="number" step="any" name="hematocrit" placeholder="Hematocrit" required>
        <input type="number" step="any" name="platelet" placeholder="Platelet Count" required>

        <!-- Symptoms -->
        <select name="headache">
            <option value="1">Severe Headache - Yes</option>
            <option value="0">No</option>
        </select>

        <select name="eye_pain">
            <option value="1">Pain Behind Eyes - Yes</option>
            <option value="0">No</option>
        </select>

        <select name="joint_pain">
            <option value="1">Joint Pain - Yes</option>
            <option value="0">No</option>
        </select>

        <select name="metallic">
            <option value="1">Metallic Taste - Yes</option>
            <option value="0">No</option>
        </select>

        <select name="appetite">
            <option value="1">Loss of Appetite - Yes</option>
            <option value="0">No</option>
        </select>

        <select name="abdominal">
            <option value="1">Abdominal Pain - Yes</option>
            <option value="0">No</option>
        </select>

        <select name="nausea">
            <option value="1">Nausea/Vomiting - Yes</option>
            <option value="0">No</option>
        </select>

        <select name="diarrhoea">
            <option value="1">Diarrhoea - Yes</option>
            <option value="0">No</option>
        </select>

        <button type="submit">Predict</button>
    </form>

    <!-- RESULT -->
    <div class="result">
        {% if prediction_text %}
            <h3 style="color: {{ color }};">{{ prediction_text }}</h3>
            <p><b>{{ advice }}</b></p>

            <!-- Progress Bar -->
            <progress value="{{ prediction_text.split('(')[1].split('%')[0] }}" max="100"></progress>
        {% endif %}
    </div>

</div>

</body>
</html>
